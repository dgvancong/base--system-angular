<div class="login m-0 d-flex position-relative">
  <div class="container-fluid wrapper p-0 ">
    <div class="row g-0 h-100">
      <!-- LEFT -->
      <div class="col-lg-7 left h-100 d-none d-md-flex position-relative align-items-center overflow-hidden text-white">
        <div class="left-content">
          <h2 class="text-white fw8">GoFinance</h2>
          <p class="m-0 p-0 fw5">The most popular peer to peer lending at SEA</p>
          <button class="btn-read  border-0 text-white fw5 mt-4">Read More</button>
        </div>
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        <div class="circle circle4"></div>
      </div>
      <!-- RIGHT -->
      <div class="col-lg-5 col-md-12 right h-100 d-flex justify-content-center align-items-center">
        <div class="login-box w-100 bg-white">
          <!-- Logo -->
          <div class="logo fw7">
            <img src="assets/image/jira-software-logo.png" alt="GoFinance Logo">
            Cloudron
          </div>

          <h5 class="pb-2 fw8 mb-3">Đăng Nhập</h5>
          <p>Bạn chưa có tài khoản? <a href="/auth/register" class="text-success text-decoration-underline">Tạo tài khoản</a></p>

          <form (ngSubmit)="onSubmit()">
            <div class="form-group">
              <input
                type="email"
                class="form-control"
                id="email"
                [(ngModel)]="email"
                name="email"
                required
                placeholder="Tài khoản">
            </div>
            <div class="form-group">
              <input
                type="password"
                class="form-control"
                id="password"
                [(ngModel)]="password"
                name="password"
                required
                placeholder="Mật khẩu">
            </div>
            <button type="submit" class="btn-login border-0 w-100 cur-pointer fw5 text-white">Đăng Nhập</button>
          </form>

          <div class="login-footer">
            <div class="line-with-text d-flex align-items-center text-center">
              <span>Hoặc</span>
            </div>
          </div>

          <div class="submit-google d-flex align-items-center justify-content-between">
            <button type="submit" class="btn-google bg-white d-flex align-items-center gap-5 w-100 fw6 cur-pointer">
              <span nz-icon nzType="ng-zorro:google_icon" nzTheme="outline" style="font-size: 20px;"></span>
              <span>Continue with Google</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
