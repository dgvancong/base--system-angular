<div class="login m-0 d-flex position-relative">
  <div class="container-fluid wrapper p-0 ">
    <div class="row g-0 h-100">
      <!-- LEFT -->
      <div class="col-lg-7 left h-100 d-none d-md-flex position-relative align-items-center overflow-hidden text-white">
        <div class="left-content">
          <h2 class="text-white fw8">GoFinance</h2>
          <p class="m-0 p-0 fw5">The most popular peer to peer lending at SEA</p>
          <button class="btn-read  border-0 text-white fw5 mt-4">Read More</button>
        </div>
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        <div class="circle circle4"></div>
      </div>
      <!-- RIGHT -->
      <div class="col-lg-5 col-md-12 right h-100 d-flex justify-content-center align-items-center">
        <div class="login-box w-100 bg-white">
          <!-- Logo -->
          <div class="logo fw7">
            <img src="assets/image/jira-software-logo.png" alt="GoFinance Logo">
            Cloudron
          </div>

          <h5 class="pb-2 fw8 mb-3">Đăng Nhập</h5>
          <p>Bạn chưa có tài khoản? <a href="/auth/register" class="text-success text-decoration-underline">Tạo tài khoản</a></p>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <input
                type="email"
                class="form-control"
                [class.is-invalid]="f['email'].invalid && f['email'].touched"
                formControlName="email"
                id="email"
                name="email"
                required
                placeholder="Tài khoản">
              <div class="invalid-feedback" *ngIf="f['email'].invalid && f['email'].touched">
                <span *ngIf="f['email'].errors?.['required']">Email is required</span>
                <span *ngIf="f['email'].errors?.['email']">Invalid email format</span>
              </div>
            </div>
            <div class="form-group">
              <input
                type="password"
                class="form-control"
                [class.is-invalid]="f['password'].invalid && f['password'].touched"
                id="password"
                formControlName="password"
                name="password"
                required
                placeholder="Mật khẩu">
              <div class="invalid-feedback" *ngIf="f['password'].invalid && f['password'].touched">
                <span *ngIf="f['password'].errors?.['required']">Password is required</span>
                <span *ngIf="f['password'].errors?.['minlength']">Password must be at least 6 characters</span>
              </div>
            </div>

            <!-- Remember Me -->
            <div class="form-check">
              <input
                  type="checkbox"
                  id="rememberMe"
                  formControlName="rememberMe"
                  class="form-check-input">
              <label for="rememberMe" class="form-check-label">Ghi nhớ đăng nhập</label>
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger" *ngIf="errorMessage">
              {{ errorMessage }}
            </div>

             <button type="submit" class="btn-login border-0 w-100 cur-pointer fw5 text-white" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Đang xử lý...' : 'Đăng nhập' }}
            </button>

          </form>

          <div class="login-footer">
            <div class="line-with-text d-flex align-items-center text-center">
              <span>Hoặc</span>
            </div>
          </div>

          <div class="submit-google d-flex align-items-center justify-content-between">
            <button type="submit" class="btn-google bg-white d-flex align-items-center gap-5 w-100 fw6 cur-pointer">
              <span nz-icon nzType="ng-zorro:google_icon" nzTheme="outline" style="font-size: 20px;"></span>
              <span>Continue with Google</span>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
