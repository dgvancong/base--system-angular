<div class="px-0 d-flex">
  <div class="sidebar-col"
    [class.collapsed]="isCollapsed"
    [style.width]="isCollapsed ? '82px' : '250px'"
    id="sidebarCol">
    <div class="hrms-sidebar">
      <div class="sidebar-brand">
        <div class="logo fw7 d-flex gap-2" [class.hidden]="isCollapsed">
          <img src="assets/image/jira-software-logo.png" alt="GoFinance Logo">
          <span *ngIf="!isCollapsed" class="mt-1">Clothing</span>
        </div>
      </div>
      <div class="wrapper">
        <ul
          nz-menu
          nzMode="inline"
          nzTheme="light"
          [nzInlineCollapsed]="isCollapsed"
          [nzInlineIndent]="isCollapsed ? 0 : 24">
          <li
            nz-menu-item
            nz-tooltip
            nzTooltipPlacement="right"
            [nzTooltipTitle]="isCollapsed ? 'Dashboard' : ''"
            class="fw5">
            <span style="font-size: 18px; color: transparent;" nz-icon nzType="ng-zorro:dashboard_icon"></span>
            <span>Dashboard</span>
          </li>
          <li
            nzOpen
            nz-submenu
            nzTitle="Quản lý hoá đơn"
            routerLink="/admin/dashboard-chart"
            class="fw5"
            nzIcon="snippets"
            nzSelected>
            <ul>
              <li nz-menu-item nzSelected>Danh sách hoá đơn</li>
            </ul>
          </li>
          <li
            nzOpen
            nz-submenu
            class="fw5"
            nzTitle="Quản lý kho"
            routerLink="/admin/manage-user"
            nzIcon="team">
            <ul>
              <li nz-menu-item class="fw5">Danh sách sản phẩm</li>
            </ul>
          </li>
          <li
            nz-menu-item
            nz-tooltip
            nzTooltipPlacement="right"
            [nzTooltipTitle]="isCollapsed ? 'Dashboard' : ''"
            class="fw5">
            <span style="font-size: 18px; color: transparent;" nz-icon nzType="ng-zorro:setting_icon"></span>
            <span>Cài đặt</span>
          </li>
        </ul>
      </div>

      <div class="collasped-box d-flex align-items-center justify-content-center position-absolute bottom-0">
        <button nz-button class="collasped border-0 p-2" (click)="toggleCollapsed()">
          <span
            style="font-size: 16px; color: transparent;"
            nz-icon
            [nzType]="isCollapsed ? 'ng-zorro:menu_unfold_icon' : 'ng-zorro:menu_fold_icon'">
          </span>
        </button>
      </div>
    </div>
  </div>
  <div class="main-content">
    <div class="top-bar d-flex align-items-center justify-content-between bg-white">
      <div class="d-flex align-items-center gap-2">

      </div>
      <div class="d-flex align-items-center gap-4 justify-content-between">
        <button nz-button class="border-0 notice p-2">
          <span
            style="font-size: 20px; color: transparent;"
            nz-icon
            nzType="ng-zorro:menu_notice_icon">
          </span>
        </button>
        <div class="user-profile d-flex align-items-center gap-2 cur-pointer" nz-dropdown nzTrigger="click" [nzDropdownMenu]="usermenu">
          <div class="image">
            <img src="assets/image/jira-software-logo.png" alt="GoFinance Logo">
          </div>
          <div class="full-name">
            <p class="p-0 m-0 fs4 fw5">Clothing Warehouse</p>
            <p class="p-0 m-0 fs2 fw5">ClothingWarehouse@gmail.com</p>
          </div>
          <button nz-button class="border-0 p-2">
            <span
              style="font-size: 20px; color: transparent;"
              nz-icon
              nzType="ng-zorro:box_icon_down">
            </span>
          </button>
        </div>

        <nz-dropdown-menu #usermenu="nzDropdownMenu">
          <ul nz-menu style="width: 180px; padding: 12px;">
            <li nz-menu-item class="d-flex align-items-center gap-2 p-2">
              <span
                style="font-size: 20px; color: transparent;"
                nz-icon
                nzType="ng-zorro:box_icon_profile">
              </span>
              Hồ sơ cá nhân
            </li>
            <li nz-menu-item class="d-flex align-items-center gap-2 p-2" (click)="showLogoutConfirm()">
              <span
                style="font-size: 20px; color: transparent;"
                nz-icon
                nzType="ng-zorro:box_icon_logout">
              </span>
              Đăng Xuất
            </li>
          </ul>
        </nz-dropdown-menu>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area p-4">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>


<!-- Modal xóa user -->
<app-popup
  [isVisiblePopup]="isLogout"
  [type]="'warning'"
  [nzMaskClosable]="true"
  [label]="'Xác nhận đăng xuất'"
  [contentText]="'Bạn có chắc chắn muốn đăng xuất khỏi hệ thống?'"
  (onCancel)="cancelLogout()"
  (onOk)="submitLogout()">
</app-popup>
